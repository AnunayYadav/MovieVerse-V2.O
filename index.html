<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieVerse AI</title>
  <link rel="icon" type="image/png" href="/image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <link href="https://fonts.cdnfonts.com/css/youtube-sans" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    body {
      font-family: 'Youtube Sans', 'Inter', sans-serif;
      background-color: #000000;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Custom Scrollbar for Chrome/Safari/Webkit */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #000000;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Hide scrollbar utility */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Glass utilities */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-panel {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
    }

    .text-shadow {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }



    /* Custom Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes slideOutBottom {
      from { transform: translateY(0); }
      to { transform: translateY(100%); }
    }

    .animate-fade-in {
      animation: fadeIn 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-fade-out {
      animation: fadeOut 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-slide-in-bottom {
      animation: slideInBottom 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-slide-out-bottom {
      animation: slideOutBottom 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    .shimmer-bg {
      position: relative;
      overflow: hidden;
      background-color: #121214;
    }

    .shimmer-bg::after {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      transform: translateX(-100%);
      background-image: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.03) 20%,
        rgba(255, 255, 255, 0.07) 60%,
        rgba(255, 255, 255, 0) 100%
      );
      animation: shimmer 2s infinite;
      content: '';
    }

    /* AI search glow effect */
    .ai-search-glow {
      border-color: transparent !important;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.4), 0 0 20px rgba(236, 72, 153, 0.2) !important;
      background: linear-gradient(#1a1a1a, #1a1a1a) padding-box,
                  linear-gradient(135deg, #a855f7, #ec4899, #3b82f6) border-box !important;
      border: 1.5px solid transparent !important;
      animation: ai-glow-pulse 2s infinite alternate !important;
    }

    @keyframes ai-glow-pulse {
      0% {
        box-shadow: 0 0 10px rgba(168, 85, 247, 0.4), 0 0 20px rgba(236, 72, 153, 0.2);
      }
      100% {
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.6), 0 0 30px rgba(236, 72, 153, 0.4), 0 0 10px rgba(59, 130, 246, 0.3);
      }
    }

    @property --gradient-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    .ai-search-glow-loading {
      border-color: transparent !important;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.6), 0 0 30px rgba(236, 72, 153, 0.4) !important;
      background: linear-gradient(#1a1a1a, #1a1a1a) padding-box,
                  conic-gradient(from var(--gradient-angle), #a855f7, #ec4899, #3b82f6, #a855f7) border-box !important;
      border: 1.5px solid transparent !important;
      animation: ai-glow-rotate 1.5s linear infinite !important;
    }

    @keyframes ai-glow-rotate {
      0% {
        --gradient-angle: 0deg;
      }
      100% {
        --gradient-angle: 360deg;
      }
    }
  </style>
  <script type="importmap">
{

  }
}
</script>
</head>

</body>

</html>
